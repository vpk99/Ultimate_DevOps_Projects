apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-demo-frontendproxy
  labels:
    app: frontendproxy
    app.kubernetes.io/component: frontendproxy
    app.kubernetes.io/part-of: opentelemetry-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontendproxy

  template:
    metadata:
      labels:
        app: frontendproxy

    spec:
      serviceAccountName: opentelemetry-demo

      containers:
      - name: frontendproxy
        image: ghcr.io/open-telemetry/demo:1.12.0-frontendproxy
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8080
          name: http

        env:
        - name: OTEL_SERVICE_NAME
          value: frontendproxy

        - name: OTEL_COLLECTOR_NAME
          value: opentelemetry-demo-otelcol

        - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
          value: cumulative

        - name: ENVOY_PORT
          value: "8080"

        - name: FLAGD_HOST
          value: opentelemetry-demo-flagd

        - name: FLAGD_PORT
          value: "8013"

        - name: FLAGD_UI_HOST
          value: opentelemetry-demo-flagd

        - name: FLAGD_UI_PORT
          value: "4000"

        - name: FRONTEND_HOST
          value: opentelemetry-demo-frontend

        - name: FRONTEND_PORT
          value: "8080"

        - name: GRAFANA_SERVICE_HOST
          value: opentelemetry-demo-grafana

        - name: GRAFANA_SERVICE_PORT
          value: "80"

        - name: IMAGE_PROVIDER_HOST
          value: opentelemetry-demo-imageprovider

        - name: IMAGE_PROVIDER_PORT
          value: "8081"

        - name: JAEGER_SERVICE_HOST
          value: opentelemetry-demo-jaeger-query

        - name: JAEGER_SERVICE_PORT
          value: "16686"

        - name: LOCUST_WEB_HOST
          value: opentelemetry-demo-loadgenerator

        - name: LOCUST_WEB_PORT
          value: "8089"

        - name: OTEL_COLLECTOR_HOST
          value: $(OTEL_COLLECTOR_NAME)

        - name: OTEL_COLLECTOR_PORT_GRPC
          value: "4317"

        - name: OTEL_COLLECTOR_PORT_HTTP
          value: "4318"

        - name: OTEL_RESOURCE_ATTRIBUTES
          value: service.name=frontendproxy,service.namespace=opentelemetry-demo,service.version=1.12.0

        resources:
          limits:
            memory: 50Mi

        securityContext:
          runAsUser: 101
          runAsGroup: 101
          runAsNonRoot: true
      
--- 

apiVersion: v1
kind: Service

metadata:
  name: opentelemetry-demo-frontendproxy
  labels:
    app: frontendproxy

spec:
  type: ClusterIP

  selector:
    app: frontendproxy

  ports:
  - name: http
    port: 8080
    targetPort: 8080