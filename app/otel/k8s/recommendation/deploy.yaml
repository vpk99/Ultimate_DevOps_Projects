apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation
  labels:
    app: recommendation
  namespace: project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recommendation
  template:
    metadata:
      name: recommendation
      labels:
        app: recommendation
    spec:
      serviceAccountName: recommendation-sa
      containers:
      - name: recommendation
        image: vpk1999/ultimate_devops_project:recommendation-service-v2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 1010
          protocol: TCP
        env:
         - name: RECOMMENDATION_PORT
           value: "1010"

         - name: PRODUCT_CATALOG_ADDR
           value: "product-catalog:8088"

         - name: OTEL_SERVICE_NAME
           value: "recommendation"

         - name: FLAGD_HOST
           value: "flagd"

         - name: FLAGD_PORT
           value: "8013"

         - name: OTEL_PYTHON_LOG_CORRELATION
           value: "true"

         - name: OTEL_EXPORTER_OTLP_ENDPOINT
           value: "http://otel-collector:4317"

         - name: OTEL_RESOURCE_ATTRIBUTES
           value: "service.name=recommendation"

        livenessProbe:
          grpc:
            port: 1010
          failureThreshold: 3
          initialDelaySeconds: 5
          periodSeconds: 5
          successThreshold: 1
        readinessProbe:
          grpc:
            port: 1010
          failureThreshold: 3
          initialDelaySeconds: 5
          periodSeconds: 5
          successThreshold: 1
        startupProbe:
          grpc:
            port: 1010
          periodSeconds: 5
          successThreshold: 1
          failureThreshold: 12

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
